name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Run integration tests (j2 rendering)
        run: |
          cd tests
          for k in *.j2; do
            echo "* Testing $k"
            jnjrender "$k" "$k.init.yaml" --output "$k.yaml"
            diff "$k.yaml" "refs/$k.yaml"
          done
