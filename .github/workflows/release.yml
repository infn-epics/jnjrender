name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push commits and create releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest build twine

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Bump version
        id: bump
        env:
          BUMP_KIND: ${{ inputs.bump }}
        run: |
          python - <<'EOF'
          import os, re, sys

          init_path = "jnjrender/__init__.py"
          with open(init_path) as f:
              content = f.read()

          m = re.search(r'__version__\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content)
          if not m:
              print("Could not find version string", file=sys.stderr)
              sys.exit(1)

          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
          bump = os.environ.get("BUMP_KIND", "patch")

          if bump == "major":
              major += 1; minor = 0; patch = 0
          elif bump == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          new_content = re.sub(
              r'__version__\s*=\s*"[^"]+"',
              f'__version__ = "{new_version}"',
              content,
          )
          with open(init_path, "w") as f:
              f.write(new_content)

          print(f"Bumped to {new_version}")
          output_file = os.environ.get("GITHUB_OUTPUT")
          if not output_file:
              print("GITHUB_OUTPUT is not set", file=sys.stderr)
              sys.exit(1)
          with open(output_file, "a") as out:
              out.write(f"version={new_version}\n")
          EOF

      - name: Commit and tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if [ -z "$NEW_VERSION" ]; then
            echo "Version output is empty; aborting."
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jnjrender/__init__.py
          git commit -m "chore: bump version to v$NEW_VERSION"
          if git rev-parse -q --verify "refs/tags/v$NEW_VERSION" >/dev/null; then
            echo "Tag v$NEW_VERSION already exists; aborting."
            exit 1
          fi
          git tag "v$NEW_VERSION"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v$NEW_VERSION"

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          generate_release_notes: true
          files: dist/*
